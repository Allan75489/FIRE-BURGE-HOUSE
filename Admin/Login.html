<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área Administrativa</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}

/* ===== FUNDO PADRÃO DO DASHBOARD ===== */
body.login-body {
    background: #0f172a;
    min-height: 100vh;
}

/* ===== LAYOUT ===== */
.login-container {
    display: flex;
    min-height: 100vh;
}

/* ===== LADO ESQUERDO ===== */
.Login-left {
    width: 50%;
    background: linear-gradient(180deg, #1f2a40, #0f172a);
    color: #fff;
    padding: 50px 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.Welcome-title {
    font-size: 34px;
    text-transform: uppercase;
}

/* ===== IMAGEM ===== */
.login-image {
    height: 260px;
    background-size: cover;
    background-position: center;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* ===== SOCIAL ===== */
.Social-media {
    display: flex;
    gap: 15px;
}

.social-icon {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #273449;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    transition: .2s;
}

.social-icon:hover {
    background: #ff2b2b;
}

.footer-note {
    font-size: 13px;
    opacity: 0.8;
}

/* ===== LADO DIREITO ===== */
.login-right {
    width: 50%;
    background: #111827;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ===== CARD ===== */
.login-form-container {
    width: 100%;
    max-width: 420px;
    background: #1f2937;
    padding: 40px;
    border-radius: 18px;
    color: #fff;
    border: 1px solid #273449;
}

/* ===== LOGO ===== */
.company-logo {
    text-align: center;
    margin-bottom: 20px;
}

.company-logo img {
    max-width: 140px;
}

/* ===== TÍTULOS ===== */
.login-title {
    text-align: center;
    font-size: 26px;
}

.login-subtitle {
    text-align: center;
    font-size: 14px;
    color: #9ca3af;
    margin-bottom: 30px;
}

/* ===== INPUT ===== */
.form-group {
    margin-bottom: 20px;
}

.input-grupup {
    position: relative;
}

.form-input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #273449;
    background: #111827;
    color: #fff;
}

.input-grupup label {
    position: absolute;
    top: -9px;
    left: 12px;
    background: #1f2937;
    padding: 0 6px;
    font-size: 12px;
    color: #ff2b2b;
}

/* ===== OLHO SENHA ===== */
.password-toggle {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #9ca3af;
    cursor: pointer;
}

/* ===== CHECKBOX ===== */
.remember-me-container {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    color: #d1d5db;
}

/* ===== BOTÃO ===== */
.btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #ff2b2b, #b30000);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: .2s;
}

.btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(255,43,43,0.25);
}

/* ===== LINK ===== */
.forgot-password-link {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #ff2b2b;
    text-decoration: none;
}

/* ===== ALERTA ===== */
.message {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 14px;
    border-radius: 10px;
    color: #fff;
    z-index: 999;
}

.success { background: #2e7d32; }
.error { background: #c62828; }

/* ===== RESPONSIVO ===== */
@media (max-width: 900px) {
    .Login-left { display: none; }
    .login-right { width: 100%; }
}
</style>
</head>

<body class="login-body">

<div class="login-container">

    <div class="Login-left">
        <h1 class="Welcome-title">Pagina Do Administrador</h1>
        <img src="../Admin/img/Baner da empresa.png">

        <div class="Social-media">
            <div class="social-icon"><i class="fab fa-facebook-f"></i></div>
            <div class="social-icon"><i class="fab fa-instagram"></i></div>
            <div class="social-icon"><i class="fab fa-linkedin-in"></i></div>
        </div>

        <div class="footer-note">Todos os direitos reservados © 2026 </div>
    </div>

    <div class="login-right">
        <div class="login-form-container">
            <div class="company-logo">
                <img src="../Admin/img/Logo da pagina adm.png" alt="logo da empresa">
            </div>

            <h2 class="login-title">Portal Administrativo</h2>
            <p class="login-subtitle">Faça login para acessar</p>

            <div class="form-group">
                <div class="input-grupup">
                    <input type="text" id="username" class="form-input">
                    <label>Usuário</label>
                </div>
            </div>

            <div class="form-group">
                <div class="input-grupup">
                    <input type="password" id="password" class="form-input">
                    <label>Senha</label>
                    <button class="password-toggle" onclick="togglePassword()">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="remember-me-container">
                <input type="checkbox" id="remember-me">
                <label>Lembrar-me</label>
            </div>

            <button class="btn" id="loginBtn">Entrar</button>
            <a href="#" class="forgot-password-link">Esqueceu a senha?</a>
        </div>
    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const loginBtn = document.getElementById('loginBtn');
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const remember = document.getElementById('remember-me');

    if (localStorage.getItem('rememberMe') === 'true') {
        username.value = localStorage.getItem('savedUsername');
        remember.checked = true;
    }

    loginBtn.addEventListener('click', () => {
        if (!username.value || !password.value) {
            showMessage('Preencha todos os campos', 'error');
            return;
        }

        if (username.value === 'admin' && password.value === 'admin123') {
            showMessage('Login realizado com sucesso', 'success');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        } else {
            showMessage('Usuário ou senha inválidos', 'error');
        }
    });
});

function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
}

function showMessage(text, type) {
    const old = document.querySelector('.message');
    if (old) old.remove();

    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerText = text;
    document.body.appendChild(div);
}
</script>

</body>
</html>
